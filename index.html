<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCard Box - V62</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        @media (min-width: 768px) { body { height: 100vh; overflow: hidden; } .desktop-scroll { overflow-y: auto; } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .loader { border: 3px solid #e2e8f0; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .auto-fit-input {
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            width: 100%; height: 1.5em; background: transparent; display: block; line-height: 1.3;
        }
        .auto-expand-input { resize: none; overflow: hidden; min-height: 38px; line-height: 1.5; field-sizing: content; }
        .action-group { display: flex; align-items: flex-end; border-bottom: 1px solid #e2e8f0; transition: border-color 0.2s; width: 100%; }
        .action-group:focus-within { border-color: #6366f1; }
        .action-btn { color: #94a3b8; padding: 4px; border-radius: 4px; transition: all 0.2s; cursor: pointer; margin-bottom: 2px; flex-shrink: 0; }
        .action-btn:hover { background-color: #eff6ff; color: #4f46e5; transform: scale(1.1); }
        .text-input-group { display: block; width: 100%; border-bottom: 1px solid #e2e8f0; transition: border-color 0.2s; }
        .text-input-group:focus-within { border-color: #6366f1; }
        .tag-pill { display: inline-flex; align-items: center; background-color: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; margin-right: 4px; margin-bottom: 4px; }
        .tag-remove { margin-left: 4px; cursor: pointer; opacity: 0.6; }
        .tag-remove:hover { opacity: 1; color: #dc2626; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col max-w-[1920px] mx-auto bg-slate-50 h-screen">

    <header class="h-16 bg-white border-b flex items-center justify-between px-4 md:px-6 flex-shrink-0 z-20 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-1.5 rounded-lg">
                <span class="material-icons text-xl">qr_code_scanner</span>
            </div>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">SmartCard <span class="text-indigo-600">V62</span></h1>
        </div>
        <button onclick="openSettings()" class="text-slate-500 hover:text-indigo-600 flex items-center gap-2 text-sm font-medium border border-slate-200 px-3 py-1.5 rounded-lg hover:bg-slate-50 transition">
            <span class="material-icons text-lg">settings</span> <span class="hidden md:inline">設定與教學</span>
        </button>
    </header>

    <div class="flex-1 flex overflow-hidden w-full">
        
        <div id="sidebar" class="w-full md:w-[300px] bg-white border-r border-slate-200 flex flex-col z-10 h-full flex-shrink-0">
            <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex-shrink-0">
                <button onclick="triggerBatchUpload()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-lg flex items-center justify-center gap-2 transition font-medium shadow-sm mb-3 text-sm active:scale-95">
                    <span class="material-icons text-lg">library_add</span> 批次新增名片
                </button>
                <input type="file" id="fileInput" accept="image/*" multiple class="hidden" onchange="handleFileUpload(event)">
                <div class="relative group mt-1">
                    <span class="material-icons absolute left-3 top-2.5 text-slate-400">search</span>
                    <input type="text" id="searchInput" oninput="renderList()" placeholder="搜尋 標籤、姓名、電話..." class="w-full pl-10 pr-4 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                </div>
            </div>
            <div id="loadingState" class="hidden p-3 bg-indigo-50 border-b border-indigo-100 flex flex-col items-center justify-center gap-1 flex-shrink-0">
                <div class="flex items-center gap-2">
                    <div class="loader"></div><span id="loadingTitle" class="text-xs text-indigo-700 font-bold">處理中...</span>
                </div>
                <div class="w-full bg-indigo-200 rounded-full h-1.5 mt-1 overflow-hidden"><div id="progressBar" class="bg-indigo-600 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div></div>
                <span id="currentModelDisplay" class="text-[10px] text-indigo-500 font-mono mt-1"></span>
            </div>
            <div id="cardList" class="flex-1 overflow-y-auto p-2 space-y-2 desktop-scroll pb-20 md:pb-2"></div>
            <div id="emptyState" class="hidden flex-1 flex flex-col items-center justify-center text-slate-400">
                <span class="material-icons text-4xl mb-2 opacity-30">travel_explore</span><p class="text-xs">找不到名片</p>
            </div>
        </div>

        <div id="mainContent" class="hidden md:flex flex-1 bg-slate-100 flex-col relative w-full h-full overflow-hidden">
            <div class="md:hidden p-2 bg-white border-b flex items-center gap-2 flex-shrink-0" id="mobileNav">
                <button onclick="backToList()" class="text-indigo-600 font-bold flex items-center text-sm px-2 py-1"><span class="material-icons text-lg">arrow_back</span> 回到列表</button>
                <span class="text-slate-500 text-xs ml-auto">編輯模式</span>
            </div>
            <div id="welcomeView" class="hidden md:flex flex-col items-center justify-center text-slate-400 h-full flex-1">
                <span class="material-icons text-6xl mb-4 text-slate-300">import_contacts</span><p class="text-lg font-medium">歡迎使用 SmartCard Box</p>
            </div>
            <div id="detailView" class="hidden flex-1 overflow-y-auto md:overflow-hidden p-0 md:p-6 w-full h-full">
                <div class="bg-white md:rounded-2xl shadow-sm md:shadow-xl w-full h-full md:max-h-[calc(100vh-8rem)] flex flex-col lg:flex-row overflow-hidden max-w-7xl mx-auto border border-slate-200">
                    
                    <div class="w-full lg:w-5/12 bg-slate-900 flex items-center justify-center p-4 lg:p-8 relative bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] min-h-[300px] lg:min-h-0 group">
                        <img id="detailImage" src="" onclick="openZoomModal(this.src)" class="max-w-full max-h-full object-contain shadow-2xl rounded border border-white/20 cursor-zoom-in transition-transform duration-300 group-hover:scale-[1.02]">
                        
                        <div id="imageControls" class="absolute top-4 right-4 flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-10 items-end">
                            <div class="flex gap-2">
                                <button onclick="switchImage('original'); event.stopPropagation();" class="bg-black/60 hover:bg-black/80 text-white text-xs px-3 py-1.5 rounded-lg backdrop-blur-sm border border-white/20 flex items-center gap-1">
                                    <span class="material-icons text-[14px]">image</span> 顯示原圖
                                </button>
                                <button onclick="switchImage('cropped'); event.stopPropagation();" class="bg-indigo-600/80 hover:bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-lg backdrop-blur-sm border border-white/20 flex items-center gap-1">
                                    <span class="material-icons text-[14px]">crop</span> 智能裁切圖
                                </button>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="manualRotate(); event.stopPropagation();" class="bg-amber-500/80 hover:bg-amber-600 text-white text-xs px-3 py-1.5 rounded-lg backdrop-blur-sm border border-white/20 flex items-center gap-1 shadow-sm">
                                    <span class="material-icons text-[14px]">rotate_right</span> 旋轉
                                </button>
                                <button onclick="triggerReupload(); event.stopPropagation();" class="bg-emerald-600/80 hover:bg-emerald-600 text-white text-xs px-3 py-1.5 rounded-lg backdrop-blur-sm border border-white/20 flex items-center gap-1 shadow-sm">
                                    <span class="material-icons text-[14px]">upload_file</span> 重傳圖片
                                </button>
                            </div>
                            <input type="file" id="reuploadInput" class="hidden" accept="image/*" onchange="handleReupload(event)">
                        </div>
                    </div>

                    <div id="detailScrollContainer" class="w-full lg:w-7/12 p-6 lg:p-10 overflow-y-auto bg-white flex flex-col h-full desktop-scroll">
                        <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                            <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2"><span class="material-icons text-indigo-600">badge</span> 名片資料</h2>
                            <div class="flex items-center gap-2">
                                <button onclick="openQrModal()" class="text-indigo-600 hover:bg-indigo-50 border border-indigo-200 px-3 py-1.5 rounded-lg transition flex items-center gap-1 text-sm font-bold">
                                    <span class="material-icons text-[16px]">qr_code_2</span> 掃碼存手機
                                </button>
                                <button onclick="deleteCurrentCard()" class="text-slate-400 hover:text-red-500 p-2 rounded-full hover:bg-red-50 transition"><span class="material-icons">delete</span></button>
                            </div>
                        </div>
                        <div class="space-y-6 flex-1 pb-10">
                            
                            <div class="w-full overflow-hidden text-input-group">
                                <div class="w-full">
                                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 block">公司 Company</label>
                                    <input id="editCompany" class="auto-fit-input w-full text-2xl font-medium text-slate-700 border-none focus:ring-0 p-0 placeholder-slate-300" oninput="adjustFontSize(this)">
                                </div>
                            </div>

                            <div class="flex flex-col md:flex-row gap-6">
                                <div class="flex-1 w-full overflow-hidden flex flex-col text-input-group">
                                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 block">姓名 Name</label>
                                    <input id="editName" class="auto-fit-input w-full text-3xl font-bold text-slate-800 border-none focus:ring-0 p-0 placeholder-slate-300 mt-auto" oninput="adjustFontSize(this)">
                                </div>
                                <div class="flex-1 w-full overflow-hidden flex flex-col text-input-group">
                                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 block">職稱 Title</label>
                                    <input id="editTitle" class="auto-fit-input w-full text-3xl font-medium text-slate-600 border-none focus:ring-0 p-0 placeholder-slate-300 mt-auto" oninput="adjustFontSize(this)">
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2">
                                <div class="w-full overflow-hidden flex flex-col">
                                    <label class="text-xs font-bold text-indigo-600 uppercase flex items-center gap-1 mb-1"><span class="material-icons text-[14px]">smartphone</span> 手機 Mobile</label>
                                    <div class="action-group mt-auto w-full">
                                        <input id="editMobile" class="auto-fit-input flex-1 text-xl text-slate-600 border-none focus:ring-0 p-0 bg-transparent" oninput="adjustFontSize(this)">
                                        <button onclick="performAction('tel', 'editMobile')" class="action-btn" title="撥打手機"><span class="material-icons text-xl">call</span></button>
                                    </div>
                                </div>
                                <div class="w-full overflow-hidden flex flex-col">
                                    <label class="text-xs font-bold text-slate-500 uppercase flex items-center gap-1 mb-1"><span class="material-icons text-[14px]">call</span> 市話 Tel</label>
                                    <div class="action-group mt-auto w-full">
                                        <input id="editLandline" class="auto-fit-input flex-1 text-xl text-slate-600 border-none focus:ring-0 p-0 bg-transparent" oninput="adjustFontSize(this)">
                                        <button onclick="performAction('tel', 'editLandline')" class="action-btn" title="撥打市話"><span class="material-icons text-xl">call</span></button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="w-full overflow-hidden">
                                <label class="text-xs font-bold text-slate-500 uppercase flex items-center gap-1 mb-1"><span class="material-icons text-[14px]">email</span> Email</label>
                                <div class="action-group w-full">
                                    <input id="editEmail" class="auto-fit-input flex-1 text-lg text-slate-600 border-none focus:ring-0 p-0 bg-transparent" oninput="adjustFontSize(this)">
                                    <button onclick="performAction('mail', 'editEmail')" class="action-btn" title="寄送郵件"><span class="material-icons text-xl">mail</span></button>
                                </div>
                            </div>
                            
                            <div>
                                <label class="text-xs font-bold text-slate-500 uppercase flex items-center gap-1 mb-1"><span class="material-icons text-[14px]">place</span> 地址 Address</label>
                                <div class="action-group items-start w-full">
                                    <textarea id="editAddress" rows="2" class="auto-expand-input flex-1 text-lg text-slate-600 border-none focus:ring-0 p-0 py-1 bg-transparent"></textarea>
                                    <button onclick="performAction('map', 'editAddress')" class="action-btn mt-1" title="開啟地圖"><span class="material-icons text-xl">map</span></button>
                                </div>
                            </div>

                            <div class="w-full mt-4 pt-4 border-t border-slate-100">
                                <label class="text-xs font-bold text-indigo-500 uppercase flex items-center gap-1 mb-2"><span class="material-icons text-[14px]">local_offer</span> 標籤 Tags</label>
                                <div id="tagContainer" class="flex gap-1 overflow-x-auto no-scrollbar pb-2"></div>
                                <div class="action-group w-full">
                                    <input id="tagInput" class="auto-fit-input flex-1 text-sm text-slate-600 border-none focus:ring-0 p-0 bg-transparent" placeholder="輸入標籤後按 Enter 新增 (例如: VIP, 廠商)..." onkeydown="handleTagInput(event)">
                                    <button onclick="addTagFromInput()" class="action-btn" title="新增標籤"><span class="material-icons text-xl">add_circle</span></button>
                                </div>
                            </div>

                        </div>
                        <div class="mt-8 pt-6 border-t border-slate-100 flex justify-end">
                            <button onclick="saveDetailEdit()" class="bg-slate-800 hover:bg-black text-white px-8 py-3 rounded-xl shadow-lg flex items-center gap-2 transform active:scale-95 transition"><span class="material-icons text-sm">save</span> 儲存變更</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="imageZoomModal" class="fixed inset-0 bg-black/95 hidden z-50 items-center justify-center p-4 md:p-8 cursor-zoom-out" onclick="closeZoomModal()">
        <button class="absolute top-4 right-4 text-white/70 hover:text-white transition p-2 bg-black/50 rounded-full">
            <span class="material-icons text-2xl">close</span>
        </button>
        <img id="zoomedImage" src="" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl border border-white/10 cursor-default" onclick="event.stopPropagation()">
    </div>

    <div id="qrModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 backdrop-blur-sm p-4" onclick="closeQrModal()">
        <div class="bg-white p-8 rounded-2xl flex flex-col items-center gap-4 shadow-2xl max-w-sm w-full relative" onclick="event.stopPropagation()">
            <button onclick="closeQrModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><span class="material-icons">close</span></button>
            <h3 class="text-xl font-bold text-slate-800">📱 掃描存入通訊錄</h3>
            <div id="qrContainer" class="p-2 border border-slate-100 rounded-lg flex items-center justify-center min-h-[200px] min-w-[200px] bg-white">
                <div id="qrcode"></div>
            </div>
            <p class="text-sm text-slate-500 text-center">使用手機相機掃描<br>即可將此名片加入聯絡人</p>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 backdrop-blur-sm p-4">
        <div id="settingsScrollContainer" class="bg-white p-6 rounded-2xl w-full max-w-md shadow-2xl max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-4 text-slate-800 border-b pb-3 flex items-center gap-2">
                <span class="material-icons text-slate-500">settings</span> 系統設定
            </h2>
            <div class="mb-5 bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                <label class="block text-xs font-bold text-indigo-700 mb-1">🔑 GOOGLE API KEY (必填)</label>
                <input type="password" id="apiKeyInput" placeholder="請貼上您的 API Key" class="w-full border border-indigo-200 p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white mb-2">
                <div class="flex flex-col gap-2 mt-2">
                    <a href="https://aistudio.google.com/app/apikey" target="_blank" class="block text-center bg-white border border-indigo-200 text-indigo-600 py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-50 transition">🔗 前往 Google AI Studio 申請 Key</a>
                    <button onclick="downloadManual()" class="flex items-center justify-center gap-1 bg-indigo-600 text-white py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-700 transition"><span class="material-icons text-[14px]">menu_book</span> 下載新手操作手冊 (HTML)</button>
                </div>
            </div>
            <div class="mb-5 p-4 bg-slate-50 rounded-xl border border-slate-200">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs font-bold text-slate-600">AI 模型</label>
                    <button onclick="runDiagnostics()" class="text-xs bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg hover:bg-indigo-200 transition flex items-center gap-1 font-bold"><span class="material-icons text-[14px]">refresh</span> 偵測</button>
                </div>
                <select id="modelSelect" class="w-full border border-slate-300 p-2.5 rounded-lg bg-white outline-none mb-2 text-sm">
                    <option value="gemini-1.5-flash-002">Gemini 1.5 Flash-002</option>
                    <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                    <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                </select>
                <div id="diagResult" class="hidden mt-3 p-3 bg-slate-900 text-green-400 text-xs font-mono rounded-lg overflow-x-auto whitespace-pre-wrap max-h-32"></div>
            </div>
            <div class="mb-5">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">資料管理</h3>
                <div class="mb-3 p-3 border border-slate-200 rounded-xl hover:bg-slate-50 transition">
                    <div class="flex justify-between items-center">
                        <div><p class="text-sm font-bold text-slate-700">完整備份 (含 Key)</p><p class="text-[10px] text-slate-400">僅限個人換機使用</p></div>
                        <button onclick="exportData(true)" class="bg-slate-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-slate-800 transition">下載備份</button>
                    </div>
                </div>
                <div class="mb-3 p-3 border border-blue-200 bg-blue-50 rounded-xl">
                    <div class="flex justify-between items-center">
                        <div><p class="text-sm font-bold text-blue-800">匯出報表 (Excel)</p><p class="text-[10px] text-blue-600">CSV 格式，支援 Excel 開啟</p></div>
                        <button onclick="exportCSV()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-700 transition flex items-center gap-1"><span class="material-icons text-[12px]">table_view</span> 匯出 CSV</button>
                    </div>
                </div>
                <div class="mb-3 p-3 border border-green-200 bg-green-50 rounded-xl">
                    <div class="flex justify-between items-center">
                        <div><p class="text-sm font-bold text-green-800">分享資料 (安全)</p><p class="text-[10px] text-green-600">移除 Key，分享給他人</p></div>
                        <button onclick="exportData(false)" class="bg-green-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-green-700 transition flex items-center gap-1"><span class="material-icons text-[12px]">share</span> 匯出分享檔</button>
                    </div>
                </div>
                <div class="pt-2 border-t border-slate-100">
                    <button onclick="triggerImport()" class="w-full bg-white border border-slate-300 text-slate-600 py-2 rounded-lg hover:bg-slate-100 transition flex items-center justify-center gap-1 text-sm font-bold"><span class="material-icons text-sm">upload</span> 匯入備份 / 分享檔</button>
                    <input type="file" id="importInput" accept=".json" class="hidden" onchange="importData(event)">
                </div>
            </div>
            <div class="flex justify-end gap-2">
                <button onclick="closeModal('settingsModal')" class="px-5 py-2.5 text-slate-500 hover:bg-slate-100 rounded-lg transition font-medium">關閉</button>
                <button onclick="saveSettings()" class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow font-medium">儲存設定</button>
            </div>
        </div>
    </div>

    <script>
        // --- Core Variables ---
        let cards = JSON.parse(localStorage.getItem('smartCardsV6')) || [];
        let currentEditingId = null;
        let tempTags = []; 

        window.onload = () => {
            renderList();
            checkFirstRun();
            // Desktop initial logic
            if(window.innerWidth >= 768 && cards.length > 0) openDetail(cards[0].id);
        };

        // V62 FIX: Device orientation/resize listener to sync views
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                // Desktop Mode constraints
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('sidebar').classList.add('flex');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('mainContent').classList.add('flex');
                document.getElementById('mobileNav').classList.add('hidden');
                
                if (currentEditingId) {
                    document.getElementById('welcomeView').classList.add('hidden');
                    document.getElementById('welcomeView').classList.remove('flex', 'md:flex');
                    document.getElementById('detailView').classList.remove('hidden');
                    document.getElementById('detailView').classList.add('flex');
                } else {
                    document.getElementById('welcomeView').classList.remove('hidden');
                    document.getElementById('welcomeView').classList.add('flex', 'md:flex');
                    document.getElementById('detailView').classList.add('hidden');
                    document.getElementById('detailView').classList.remove('flex');
                    if (cards.length > 0) openDetail(cards[0].id);
                }
            } else {
                // Mobile Mode constraints
                if (currentEditingId) {
                    document.getElementById('sidebar').classList.add('hidden');
                    document.getElementById('sidebar').classList.remove('flex');
                    document.getElementById('mainContent').classList.remove('hidden');
                    document.getElementById('mainContent').classList.add('flex');
                } else {
                    document.getElementById('sidebar').classList.remove('hidden');
                    document.getElementById('sidebar').classList.add('flex');
                    document.getElementById('mainContent').classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('flex');
                }
            }
        });

        function rotateBase64(base64Str) {
            return new Promise(resolve => {
                if (!base64Str) { resolve(null); return; }
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.height;
                    canvas.height = img.width;
                    const ctx = canvas.getContext('2d');
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.rotate(90 * Math.PI / 180);
                    ctx.drawImage(img, -img.width / 2, -img.height / 2);
                    resolve(canvas.toDataURL('image/jpeg', 0.9));
                };
                img.onerror = () => resolve(base64Str); 
                img.src = base64Str;
            });
        }

            try {
                const [newOriginal, newCropped] = await Promise.all([
                    rotateBase64(c.originalImage),
                    rotateBase64(c.croppedImage)
                ]);

                c.originalImage = newOriginal;
                c.croppedImage = newCropped;
                c.image = await rotateBase64(c.image);

                localStorage.setItem('smartCardsV6', JSON.stringify(cards));
                
                const imgEl = document.getElementById('detailImage');
                imgEl.src = c.image;
                
            } catch(e) {

        function compressImage(file, maxSide) {
            return new Promise(r => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const c = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if(w>h){if(w>maxSide){h*=maxSide/w;w=maxSide;}}else{if(h>maxSide){w*=maxSide/h;h=maxSide;}}
                        c.width = w; c.height = h;
                        c.getContext('2d').drawImage(img, 0, 0, w, h);
                        r({ base64: c.toDataURL('image/jpeg', 0.8) }); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function handleFileUpload(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            if (!apiKey) { alert('請先設定 API Key'); openSettings(); return; }

            const total = files.length;
            toggleLoading(true, `準備處理 0 / ${total}`, model);
            let successCount = 0, failCount = 0;
            let errorLog = [];

            for (let i = 0; i < total; i++) {
                const file = files[i];
                updateProgress(`正在處理 ${i + 1} / ${total}`, ((i)/total)*100);
                if(i > 0) await new Promise(r => setTimeout(r, 1500));

                try {
                    const compressedData = await compressImage(file, 1200);
                    const originalBase64 = compressedData.base64;
                    const aiResult = await callGemini(originalBase64, apiKey, model);
                    
                    let finalImage = originalBase64;
                    let croppedImage = originalBase64; 

                    if (aiResult.box_2d) { 
                        try { 
                            croppedImage = await cropImageByBox(originalBase64, aiResult.box_2d, aiResult.orientation); 
                            finalImage = croppedImage; 
                        } catch(e){ console.warn("Crop failed:", e); } 
                    }

                    const newCard = { 
                        id: Date.now() + i, 
                        image: finalImage,
                        croppedImage: croppedImage, 
                        originalImage: originalBase64, 
                        name: aiResult.name, title: aiResult.title, company: aiResult.company, 
                        mobile: aiResult.mobile, landline: aiResult.landline, email: aiResult.email, address: aiResult.address, 
                        tags: [], 
                        timestamp: new Date().toISOString() 
                    };
                    
                    cards.unshift(newCard);
                    localStorage.setItem('smartCardsV6', JSON.stringify(cards));
                    renderList();
                    if (i === 0) openDetail(newCard.id);
                    successCount++;
                } catch (error) { 
                    console.error(error); 
                    failCount++; 
                    errorLog.push(`${file.name}: ${error.message}`);
                }
            }
            updateProgress(`完成！成功 ${successCount} / 失敗 ${failCount}`, 100);
            setTimeout(() => { 
                toggleLoading(false); 
                document.getElementById('fileInput').value = ''; 
                if(failCount > 0) {
                    alert(`完成，但有 ${failCount} 張失敗。\n詳情：\n${errorLog.join('\n')}`);
                }
            }, 1000);
        }

        async function callGemini(base64, apiKey, modelName) {
            const cleanBase64 = base64.split(',')[1];
            const finalModelName = modelName.startsWith('models/') ? modelName : `models/${modelName}`;
            const url = `https://generativelanguage.googleapis.com/v1beta/${finalModelName}:generateContent?key=${apiKey}`;
            const prompt = `Analyze this business card image. 1. Identify the precise bounding box of the card object (edges). 2. Determine if the card layout is 'Horizontal' (width > height) or 'Vertical' (height > width). 3. Extract info. Return JSON: {"name":"", "title":"", "company":"", "mobile":"", "landline":"", "email":"", "address":"", "orientation": "直式" or "橫式", "box_2d":[ymin,xmin,ymax,xmax]}`;
            
            const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: cleanBase64 } }] }] }) });
            const data = await response.json();
            if (data.error) throw new Error(data.error.message); 
            
            let rawText = data.candidates[0].content.parts[0].text;
            let jsonString = rawText.replace(/```json|```/g, '').trim();
            const firstBrace = jsonString.indexOf('{');
            const lastBrace = jsonString.lastIndexOf('}');
            if (firstBrace !== -1 && lastBrace !== -1) {
                jsonString = jsonString.substring(firstBrace, lastBrace + 1);
            }
            return JSON.parse(jsonString);
        }

        function cropImageByBox(base64, box, orientation) {
            return new Promise(r => {
                const [ymin, xmin, ymax, xmax] = box;
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas');
                    const w = img.width, h = img.height;
                    
                    const paddingX = (w * 0.02);
                    const paddingY = (h * 0.02);
                    
                    let sx = Math.max(0, (xmin / 1000) * w - paddingX);
                    let sy = Math.max(0, (ymin / 1000) * h - paddingY);
                    
                    let rawW = ((xmax - xmin) / 1000) * w;
                    let rawH = ((ymax - ymin) / 1000) * h;
                    
                    let sw = rawW + (paddingX * 2);
                    let sh = rawH + (paddingY * 2);

                    if (sx + sw > w) sw = w - sx;
                    if (sy + sh > h) sh = h - sy;

                    if (sw <= 10 || sh <= 10) { r(base64); return; }

                    let needsRotation = false;
                    if (orientation === '直式' && sw > sh) {
                        needsRotation = true;
                    }

                    if (needsRotation) {
                        c.width = sh;
                        c.height = sw;
                        const ctx = c.getContext('2d');
                        ctx.translate(sh/2, sw/2);
                        ctx.rotate(90 * Math.PI / 180);
                        ctx.drawImage(img, sx, sy, sw, sh, -sw/2, -sh/2, sw, sh);
                    } else {
                        c.width = sw;
                        c.height = sh;
                        c.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
                    }
                    r(c.toDataURL('image/jpeg', 0.9));
                };
                img.src = base64;
            });
        }
    </script>
